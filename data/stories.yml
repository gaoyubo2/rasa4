version: "2.0"

stories:
- story: happy path
  steps:
  - intent: greet
  - action: utter_greet
  - intent: mood_great
  - action: utter_happy

- story: sad path 1
  steps:
  - intent: greet
  - action: utter_greet
  - intent: mood_unhappy
  - action: utter_cheer_up
  - action: utter_did_that_help
  - intent: affirm
  - action: utter_happy

- story: sad path 2
  steps:
  - intent: greet
  - action: utter_greet
  - intent: mood_unhappy
  - action: utter_cheer_up
  - action: utter_did_that_help
  - intent: deny
  - action: utter_goodbye

- story: query from Neo4j
  steps:
  - intent: inquire_neo4j
  - action: action_query_neo4j

- story: generate gcode story
  steps:
    - intent: request_gcode
    - action: gcode_form
    - active_loop: gcode_form
    - action: action_generate_gcode
    - action: utter_goodbye

- story: request processing
  steps:
    - intent: request_outer_circle_processing
    - action: action_request_outer_circle_processing
    - slot_was_set:
      - process_type: null
    - action: action_confirm_processing
